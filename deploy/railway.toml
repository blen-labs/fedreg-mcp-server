# Railway service config. Reference this file from your Railway project Settings.
# https://docs.railway.com/guides/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
startCommand = "node dist/bin.js --http"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
# Railway routes the public URL to the port your service listens on (the PORT env
# var it injects). Our bin reads PORT and defaults to 8080.
